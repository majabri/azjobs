name: Pre-Deploy Validation Pipeline
# Runs on every pull request to enforce schema alignment before merge
# Prevents incidents like ICR-2026-04-25-001 (NULL constraint violation)

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'supabase/**'
      - 'src/**'
      - 'supabase/functions/**'
      - '.github/workflows/**'

jobs:
  schema-validation:
    name: Pre-Deploy Schema Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v40
        with:
          files: |
            supabase/migrations/**
            supabase/functions/**
            src/**

      - name: Run schema validation script
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          echo "🔍 Changed files detected — running schema validation..."
          bash scripts/validate-schema.sh
        env:
          CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}

      - name: Skip validation (no relevant changes)
        if: steps.changed-files.outputs.any_changed != 'true'
        run: |
          echo "⏭️  No schema/function/src changes detected — skipping validation"
          echo "✅ Pre-Deploy Validation PASSED (no relevant changes)"

      - name: Comment PR with checklist
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Pre-Deploy Validation Checklist')
            );

            const checklistContent = `## ✅ Pre-Deploy Validation Checklist

> Auto-generated by Pre-Deploy Validation Pipeline · [ICR-2026-04-25-001 prevention](https://drive.google.com/file/d/12OVdNHesItN03YkiqDMbywjV1wHcoRY8/view)

### Schema Alignment
- [ ] All columns referenced in \`CHECK\` constraints are **explicitly set** in every INSERT statement
- [ ] Counter / metric fields are initialized to **safe defaults** (e.g. \`0\`, not \`NULL\`)
- [ ] No \`NULL\` values for constrained fields (unless intentional and documented)
- [ ] New migrations include \`DEFAULT\` values on constrained numeric columns

### Code Review
- [ ] INSERT statements have a comment explaining field initialization strategy
- [ ] Any new \`CHECK\` constraint is documented with example values
- [ ] Migration includes rollback plan (-- DOWN block or explicit steps)

### Testing
- [ ] E2E / integration test covers INSERT → constraint evaluation → UPDATE flow
- [ ] Test verifies constraint passes with initialized values
- [ ] Test verifies graceful error handling on constraint violation

### Documentation
- [ ] \`DEPLOY-CHECKLIST.md\` updated if a new migration was applied to prod
- [ ] \`AGENT_HANDOFF\` updated if this closes a known issue

---
*Last updated by PR #${{ github.event.pull_request.number }} · ${{ github.sha }}*`;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: checklistContent,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: checklistContent,
              });
            }

  status-check:
    name: Overall Validation Status
    runs-on: ubuntu-latest
    needs: [schema-validation]
    if: always()

    steps:
      - name: Check validation results
        run: |
          if [ "${{ needs.schema-validation.result }}" = "failure" ]; then
            echo "❌ Pre-Deploy Schema Validation FAILED — merge blocked"
            echo "Fix all issues flagged by scripts/validate-schema.sh before merging."
            exit 1
          else
            echo "✅ All Pre-Deploy Validations PASSED — safe to merge"
          fi
