name: Pre-Deploy Validation Pipeline
# Runs on every pull request to enforce schema alignment before merge
# Prevents incidents like ICR-2026-04-25-001 (NULL constraint violation)

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'supabase/**'
      - 'src/**'
      - 'supabase/functions/**'
      - '.github/workflows/**'

jobs:
  schema-validation:
    name: Pre-Deploy Schema Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v40
        with:
          files: |
            supabase/migrations/**
            supabase/functions/**
            src/**
      - name: Run schema validation script
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          echo "Running schema validation..."
          bash scripts/validate-schema.sh
        env:
          CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
      - name: Skip validation (no relevant changes)
        if: steps.changed-files.outputs.any_changed != 'true'
        run: |
          echo "No schema/function/src changes detected - skipping validation"
          echo "Pre-Deploy Validation PASSED (no relevant changes)"

  status-check:
    name: Overall Validation Status
    runs-on: ubuntu-latest
    needs: [schema-validation]
    if: always()
    steps:
      - name: Check validation results
        run: |
          if [ "${{ needs.schema-validation.result }}" = "failure" ]; then
            echo "Pre-Deploy Schema Validation FAILED - merge blocked"
            exit 1
          else
            echo "All Pre-Deploy Validations PASSED - safe to merge"
          fi
