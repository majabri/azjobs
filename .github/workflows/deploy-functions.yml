name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: bryoehuhhhjqcueomgev

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref $SUPABASE_PROJECT_REF

      - name: Deploy all Edge Functions
        run: |
          for dir in supabase/functions/*/; do
            fn_name=$(basename "$dir")
            if [ -f "$dir/index.ts" ]; then
              echo "Deploying $fn_name..."
              supabase functions deploy "$fn_name" --no-verify-jwt
            fi
          done

      - name: Verify deployments
        run: |
          FUNCTIONS=(
            "ai-recovery-service"
            "billing-service"
            "catalog-service"
            "gig-service"
            "project-service"
            "proposal-service"
            "reputation-service"
            "support-service"
            "watchdog-service"
          )
          for fn in "${FUNCTIONS[@]}"; do
            echo "Checking $fn..."
            response=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
              -d '{"action":"health_ping"}' \
              "https://$SUPABASE_PROJECT_REF.supabase.co/functions/v1/$fn")
            if [ "$response" = "200" ]; then
              echo "  â $fn is healthy"
            else
              echo "  â $fn returned $response"
            fi
          done
