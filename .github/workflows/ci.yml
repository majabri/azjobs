name: CI


on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]


jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest


    steps:
      - name: Checkout code
        uses: actions/checkout@v4


      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest


      - name: Install dependencies
        run: bun install


      - name: Type check
        run: bun run tsc --noEmit


      - name: Lint
        run: bun run lint


      - name: SOA boundary check
        run: bun run check:soa


      - name: Run tests with coverage
        run: bun run test --coverage
