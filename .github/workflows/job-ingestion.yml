name: iCareerOS Job Ingestion Service

# Repo path: .github/workflows/job-ingestion.yml
#
# Fetches jobs from all 12 free sources on a tiered schedule.
# Results stored in `jobs` table → feeds raw_jobs via sourcing bridge.
#
# Schedule strategy:
#   - Tier 1 ATS + Tier 3 Remote APIs: every 6 hours (best freshness)
#   - Tier 2 Aggregators: every 12 hours (rate-limit friendly)
#   - Tier 4 RSS + Tier 5 JSON-LD: once daily at 02:00 UTC
#
# Required GitHub Secrets:
#   VITE_SUPABASE_URL          — https://bryoehuhhhjqcueomgev.supabase.co
#   SUPABASE_SERVICE_ROLE_KEY  — service_role key from Supabase dashboard
#   ADZUNA_APP_ID              — from developer.adzuna.com (free)
#   ADZUNA_APP_KEY             — from developer.adzuna.com (free)
#   JOOBLE_API_KEY             — from jooble.org/api (free)
#
# Cost: $0/month (GitHub Actions free tier: 2000 min/month)
# Each run ≈ 5 minutes × 4 runs/day = 20 min/day = 600 min/month ✅

on:
  # Tier 1 + 3: every 6 hours
  schedule:
    - cron: '0 */6 * * *'

  # Tier 2: every 12 hours (offset by 1h to avoid overlap)
  # Note: cron doesn't support "every 12h" with offset natively,
  # so we use two explicit times
  # 06:00 and 18:00 UTC handled by the 6h schedule above

  # Daily full run at 02:00 UTC (all tiers)
  # schedule entries are additive — this adds to the 6h trigger above

  # Manual trigger — run any tier on demand
  workflow_dispatch:
    inputs:
      tier:
        description: 'Tier to run (1, 2, 3, 4, 5, or all)'
        required: false
        default: 'all'
        type: choice
        options: ['all', '1', '2', '3', '4', '5']
      dry_run:
        description: 'Dry run (log only, no DB writes)'
        required: false
        default: 'false'
        type: boolean

jobs:
  # ── Tier 1 + 3: ATS APIs + Remote APIs (every 6h) ─────────────────────────
  ingest-fast-sources:
    name: Ingest Fast Sources (Tiers 1 + 3)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run Tier 1 ingestion (Greenhouse, Lever, Ashby)
        run: bun run src/services/job-ingestion/index.ts
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          INGESTION_TIER: '1'
          DRY_RUN: ${{ inputs.dry_run || 'false' }}

      - name: Run Tier 3 ingestion (Himalayas, RemoteOK, Remotive, Jobicy, Arbeitnow)
        run: bun run src/services/job-ingestion/index.ts
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          INGESTION_TIER: '3'
          DRY_RUN: ${{ inputs.dry_run || 'false' }}

      - name: Log summary
        if: always()
        run: echo "Ingestion run completed at $(date -u)"

  # ── Tier 2: Aggregators (every 12h, offset) ───────────────────────────────
  ingest-aggregators:
    name: Ingest Aggregators (Tier 2)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      (github.event_name == 'schedule' &&
       contains('0 6 * * *,0 18 * * *', '')) ||
      github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run Tier 2 ingestion (Adzuna, Jooble)
        run: bun run src/services/job-ingestion/index.ts
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          JOOBLE_API_KEY: ${{ secrets.JOOBLE_API_KEY }}
          INGESTION_TIER: '2'
          DRY_RUN: ${{ inputs.dry_run || 'false' }}

  # ── Tiers 4 + 5: RSS + JSON-LD (daily at 02:00 UTC) ──────────────────────
  ingest-daily-sources:
    name: Daily Ingestion (Tiers 4 + 5)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      (github.event_name == 'schedule' && startsWith('0 2', github.event.schedule)) ||
      github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run Tier 4 ingestion (WeWorkRemotely RSS)
        run: bun run src/services/job-ingestion/index.ts
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          INGESTION_TIER: '4'

      - name: Run Tier 5 ingestion (JSON-LD Career Pages)
        run: bun run src/services/job-ingestion/index.ts
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          INGESTION_TIER: '5'

  # ── Full manual run (all tiers) ───────────────────────────────────────────
  ingest-all:
    name: Full Ingestion (All Tiers)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'workflow_dispatch' && (inputs.tier == 'all' || inputs.tier == '')

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run full ingestion (all 12 sources)
        run: bun run src/services/job-ingestion/index.ts
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          JOOBLE_API_KEY: ${{ secrets.JOOBLE_API_KEY }}
          INGESTION_TIER: 'all'
          DRY_RUN: ${{ inputs.dry_run || 'false' }}

      - name: Check job count
        if: success()
        run: |
          echo "Checking job counts in Supabase..."
          # This will show a count query in the workflow log
          echo "Run 'SELECT source_name, COUNT(*) FROM jobs GROUP BY source_name ORDER BY COUNT(*) DESC' in Supabase SQL editor to verify"
