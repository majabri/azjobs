name: iCareerOS Daily Benchmarks

# Repo path: .github/workflows/job-benchmarks.yml
#
# Runs a full pipeline benchmark every morning at 07:30 UTC
# (after the overnight batch completes at ~07:00 UTC)
#
# Reports:
#   - Coverage: active jobs, unique companies, dedup rate
#   - Performance: extraction latency, jobs/hour
#   - Accuracy: confidence scores, feedback rates
#   - Cost: API call counts vs free-tier limits
#   - Health: sources active, pipeline lag

on:
  schedule:
    - cron: '30 7 * * *'   # 07:30 UTC daily (after overnight batch)
  workflow_dispatch:        # Manual run

jobs:
  benchmark:
    name: Pipeline Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run benchmarks
        run: bun run src/services/benchmarks/index.ts
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Check minimum source threshold
        run: |
          echo "✅ Benchmark complete — check logs above for full report"
          echo "Target: 8+ of 12 sources operational, <1% error rate"
