name: Diagnose discovery-agent failure

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check secrets present
        run: |
          [ -n "${{ secrets.VITE_SUPABASE_URL }}" ] && echo "VITE_SUPABASE_URL: SET" || echo "VITE_SUPABASE_URL: MISSING"
          [ -n "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" ] && echo "SUPABASE_SERVICE_ROLE_KEY: SET" || echo "SUPABASE_SERVICE_ROLE_KEY: MISSING"
          [ -n "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ] && echo "SUPABASE_ACCESS_TOKEN: SET" || echo "SUPABASE_ACCESS_TOKEN: MISSING"

      - name: Call discovery-agent edge function (verbose)
        run: |
          echo "=== Calling edge function ==="
          HTTP_CODE=$(curl -s -o /tmp/body.txt -w "%{http_code}" \
            -X POST "${{ secrets.VITE_SUPABASE_URL }}/functions/v1/discovery-agent" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            --max-time 90)
          echo "HTTP Code: $HTTP_CODE"
          echo "Response body:"
          cat /tmp/body.txt | python3 -m json.tool 2>/dev/null || cat /tmp/body.txt

      - name: Check deployed functions via Supabase API
        run: |
          curl -s "https://api.supabase.com/v1/projects/bryoehuhhhjqcueomgev/functions" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" | \
            python3 -c "import sys,json; fns=json.load(sys.stdin); [print(f[\"slug\"], \"->\", f.get(\"status\",\"?\")) for f in fns] if isinstance(fns, list) else print(fns)"
