name: Diagnose discovery-agent — write output

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Call edge function and capture output
        run: |
          HTTP_CODE=$(curl -s -o /tmp/fn_body.txt -w "%{http_code}" \
            -X POST "${{ secrets.VITE_SUPABASE_URL }}/functions/v1/discovery-agent" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            --max-time 90)
          
          echo "## Discovery Agent Diagnostic" > /tmp/diag_result.md
          echo "- Date: $(date -u)" >> /tmp/diag_result.md
          echo "- HTTP Code: $HTTP_CODE" >> /tmp/diag_result.md
          echo "" >> /tmp/diag_result.md
          echo "### Response Body" >> /tmp/diag_result.md
          echo "\`\`\`json" >> /tmp/diag_result.md
          cat /tmp/fn_body.txt | python3 -m json.tool 2>/dev/null || cat /tmp/fn_body.txt >> /tmp/diag_result.md
          echo "\`\`\`" >> /tmp/diag_result.md
          
          # Write to step summary so it appears in GitHub Actions UI
          cat /tmp/diag_result.md >> $GITHUB_STEP_SUMMARY
          
          # Also save to repo for retrieval
          mkdir -p .diag
          cp /tmp/diag_result.md .diag/discovery_diag.md
          echo "HTTP_CODE=$HTTP_CODE" >> .diag/discovery_diag.md
          cat /tmp/fn_body.txt >> .diag/discovery_fn_body.txt
          
          echo "HTTP Code: $HTTP_CODE"
          cat /tmp/fn_body.txt

      - name: Commit diagnostic output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .diag/
          git diff --staged --quiet || git commit -m "diag: discovery-agent response [skip ci]"
          git push
