name: Diagnose discovery-agent failure

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show secret presence and URL shape
        run: |
          URL="${{ secrets.VITE_SUPABASE_URL }}"
          KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
          echo "VITE_SUPABASE_URL set: $([ -n \"$URL\" ] && echo YES || echo NO)"
          echo "VITE_SUPABASE_URL length: ${#URL}"
          echo "VITE_SUPABASE_URL last 20 chars: ...${URL: -20}"
          echo "SUPABASE_SERVICE_ROLE_KEY set: $([ -n \"$KEY\" ] && echo YES || echo NO)"
          echo "SUPABASE_SERVICE_ROLE_KEY length: ${#KEY}"
          echo "SUPABASE_SERVICE_ROLE_KEY last 30 chars: ...${KEY: -30}"

      - name: Call function and capture full response + headers
        run: |
          HTTP_CODE=$(curl -sv -o /tmp/fn_body.txt -w "%{http_code}" \
            -X POST "${{ secrets.VITE_SUPABASE_URL }}/functions/v1/discovery-agent" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            --max-time 90 2>/tmp/fn_headers.txt)
          echo "HTTP Code: $HTTP_CODE"
          echo "=== Body ===" && cat /tmp/fn_body.txt
          echo "" && echo "=== Response headers ===" && grep "< " /tmp/fn_headers.txt | head -20

      - name: Write results to repo
        run: |
          mkdir -p .diag
          URL="${{ secrets.VITE_SUPABASE_URL }}"
          KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
          {
            echo "Date: $(date -u)"
            echo "URL_SET=$([ -n \"$URL\" ] && echo YES || echo NO)"
            echo "URL_LEN=${#URL}"
            echo "URL_TAIL=...${URL: -20}"
            echo "KEY_SET=$([ -n \"$KEY\" ] && echo YES || echo NO)"
            echo "KEY_LEN=${#KEY}"
            echo "KEY_TAIL=...${KEY: -30}"
          } > .diag/discovery_diag.md
          cat /tmp/fn_body.txt > .diag/discovery_fn_body.txt

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .diag/
          git diff --staged --quiet || git commit -m "diag: discovery-agent v3 [skip ci]"
          git push
