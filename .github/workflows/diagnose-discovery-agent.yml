name: Diagnose discovery-agent — simple capture

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Call edge function and capture response
        run: |
          HTTP_CODE=$(curl -s -o /tmp/body.txt -w "%{http_code}" \
            -X POST "${{ secrets.VITE_SUPABASE_URL }}/functions/v1/discovery-agent" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            --max-time 90)
          echo "HTTP: $HTTP_CODE"
          cat /tmp/body.txt
          mkdir -p .diag
          echo "Date: $(date -u)" > .diag/discovery_diag.md
          echo "HTTP_CODE=$HTTP_CODE" >> .diag/discovery_diag.md
          cp /tmp/body.txt .diag/discovery_fn_body.txt

      - name: Commit results
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .diag/
          git diff --staged --quiet || git commit -m "diag: capture result [skip ci]"
          git push || true
