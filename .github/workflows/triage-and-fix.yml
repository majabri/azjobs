name: Triage Issues and Fix PRs

on:
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write
  contents: write

jobs:
  close-phase-issues:
    name: Close Phase roadmap issues
    runs-on: ubuntu-latest
    steps:
      - name: Close Phase issues 112-120 with comments
        uses: actions/github-script@v7
        with:
          script: |
            const issues = [
              { number: 112, reason: 'not_planned', comment: 'Closing: Phase 2.5 Intelligence Layer is future roadmap, not currently active. Tracked in consolidated build plan.' },
              { number: 113, reason: 'not_planned', comment: 'Closing: Phase 2.6 Bug Reporting Pipeline is future roadmap, not currently active. Tracked in consolidated build plan.' },
              { number: 114, reason: 'completed',   comment: 'Closing as completed: Vercel is deployed with CI/CD on every push and preview deployments on all PRs.' },
              { number: 115, reason: 'not_planned', comment: 'Closing: Phase 4 Supabase env separation is future roadmap, not currently active. Tracked in consolidated build plan.' },
              { number: 116, reason: 'not_planned', comment: 'Closing: Phase 7 Two-Sided Marketplace is future roadmap, not currently active. Tracked in consolidated build plan.' },
              { number: 117, reason: 'not_planned', comment: 'Closing: Phase 8 Event Bus + SOA is future roadmap, not currently active. Tracked in consolidated build plan.' },
              { number: 118, reason: 'not_planned', comment: 'Closing: Phase 9 Gig Marketplace is future roadmap, not currently active. Tracked in consolidated build plan.' },
              { number: 119, reason: 'not_planned', comment: 'Closing: Phase 10 Service Catalog + Payments is future roadmap, not currently active. Tracked in consolidated build plan.' },
              { number: 120, reason: 'not_planned', comment: 'Closing: Phase 11 Production Launch Validation is future roadmap, not currently active. Tracked in consolidated build plan.' },
            ];
            for (const issue of issues) {
              try {
                const { data: cur } = await github.rest.issues.get({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number });
                if (cur.state === "closed") { console.log(`#${issue.number} already closed.`); continue; }
                await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number, body: issue.comment });
                await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number, state: "closed", state_reason: issue.reason });
                console.log(`Closed #${issue.number}`);
              } catch (e) { console.error(`Error #${issue.number}: ${e.message}`); }
            }

  fix-pr-151-css:
    name: Fix CSS comment close in PR 151
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/replace-teal-with-brand-indigo
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Fix missing */ line 10
        run: |
          python3 -c "
          lines = open('src/index.css').readlines()
          if '========' in lines[9] and not lines[9].rstrip().endswith('*/'):
              lines[9] = lines[9].rstrip('\n').rstrip() + ' */\n'
          open('src/index.css','w').writelines(lines)
          print('fixed')"
      - name: Verify and commit
        run: |
          node -e "const c=require('fs').readFileSync('src/index.css','utf-8');let d=0;for(const x of c)d+=x==='{'?1:x==='}'?-1:0;if(d)process.exit(1);console.log('OK');"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/index.css
          git diff --staged --quiet || git commit -m 'fix: restore missing */ CSS comment close line 10' && git push || true

  fix-pr-138-conflicts:
    name: Rebase PR 138 against dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/job-scraper
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Merge dev into feature/job-scraper
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin dev
          git merge origin/dev --no-edit || (
            git checkout --theirs -- . 2>/dev/null || true
            git checkout HEAD -- scripts/ supabase/migrations/ .github/workflows/job-scraper.yml 2>/dev/null || true
            git add -A
            git commit -m 'chore: merge dev into feature/job-scraper'
          )
          git push origin feature/job-scraper
