name: iCareerOS Job Scraper

on:
  schedule:
    - cron: '0 */2 * * *'   # every 2 hours, free GitHub compute
  workflow_dispatch:          # manual trigger: Actions > iCareerOS Job Scraper > Run workflow

jobs:
  scrape-jobs:
    name: Scrape Jobs > Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run scraper
        run: python scripts/scrape_jobs.py
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Done
        if: always()
        run: echo "Scraper finished at $(date -u)"
