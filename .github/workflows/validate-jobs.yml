name: iCareerOS Job Validator

# Runs daily at 3 AM UTC — after the scraper has had time to ingest overnight jobs.
# Also runs automatically after the Job Scraper workflow completes (on push to main).
# Can be triggered manually from Actions > Run workflow.
#
# What it does:
#   1. Fetches all job_postings rows not validated in the last 24 hours
#   2. Runs three-layer validation: heuristics → live URL check → AI (Claude Haiku)
#   3. Writes quality_score, is_flagged, flag_reasons, url_valid back to Supabase
#
# Required secrets:
#   VITE_SUPABASE_URL          Supabase project URL
#   SUPABASE_SERVICE_ROLE_KEY  Supabase service-role key
#   ANTHROPIC_API_KEY          Claude Haiku for borderline job AI check

on:
  schedule:
    - cron: '0 3 * * *'    # 3 AM UTC daily
  workflow_dispatch:         # Manual trigger: Actions > Run workflow
    inputs:
      max_jobs:
        description: 'Max jobs to validate (default: 500)'
        required: false
        default: '500'
      disable_ai:
        description: 'Disable AI check (faster, cheaper)'
        required: false
        default: 'false'
        type: boolean

jobs:
  validate-jobs:
    name: Validate Job Postings → Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run job validator
        run: python scripts/validate_jobs.py
        env:
          SUPABASE_URL:         ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          VALIDATE_MAX_JOBS:    ${{ github.event.inputs.max_jobs || '500' }}
          DISABLE_AI_CHECK:     ${{ github.event.inputs.disable_ai == 'true' && '1' || '0' }}
          VALIDATE_STALE_HOURS: '24'
          URL_CHECK_TIMEOUT_SECS: '5'

      - name: Done
        if: always()
        run: echo "Validator finished at $(date -u)"
